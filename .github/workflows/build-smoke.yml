name: Build Smoke Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OpenMakaiRanchGame/OpenMakaiRanchGame.csproj

      - name: Build
        run: dotnet build OpenMakaiRanchGame/OpenMakaiRanchGame.csproj --configuration Release --no-restore
